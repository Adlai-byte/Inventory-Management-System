# ==========================================
# BATISTIL Inventory - Docker Compose
# ==========================================
# For LAN-only deployment with MySQL
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f app
#

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: bastistil-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bmm_db}
      MYSQL_USER: ${MYSQL_USER:-bmm_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bmm_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/inventory_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bastistil-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bastistil-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-bmm_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bmm_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bmm_db}
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-32-char-minimum-secret-key}
      SESSION_COOKIE_SECURE: "false"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bastistil-network

volumes:
  mysql_data:
    driver: local

networks:
  bastistil-network:
    driver: bridge
